name: Test

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 22 * * 3'
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test
    strategy:
      matrix:
        node-version:
          - '22.12.x'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "${{ matrix.node-version }}"
          cache: 'yarn'
      - name: Install
        run: yarn install --immutable
      - name: Generate self-signed signing identity
        run: ./spec/ci/generate-identity.sh
      - name: Test
        run: yarn build && yarn test
  test-linux:
    name: Test JS packaging on Linux
    strategy:
      matrix:
        node-version:
          - '22.12.x'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "${{ matrix.node-version }}"
          cache: 'yarn'
      - name: Install
        run: yarn install --immutable
      - name: Build
        run: yarn build
      # The JS packaging implementation is cross-platform for unsigned
      # packages; run its unit and flat() suites (native-parity specs
      # self-skip off macOS), then exercise the shipped CLI end-to-end.
      - name: Test
        run: yarn vitest run spec/pkg-utils spec/flat.spec.ts
      - name: CLI smoke test
        run: node spec/ci/js-flat-smoke.mjs
